<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>AIナビ</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;min-height:100%;font-family:"Segoe UI","Yu Gothic","Hiragino Sans",sans-serif;background:#07175c;color:#fff}
body{overflow-x:hidden}
.app{
  min-height:100dvh;
  padding:max(18px,env(safe-area-inset-top)) 18px max(18px,env(safe-area-inset-bottom));
  background:
    linear-gradient(to bottom,rgba(0,10,55,.05),rgba(0,10,55,.10) 45%,rgba(0,8,45,.72)),
    url("background.png") center/cover fixed;
  position:relative;
  overflow:hidden;
}
header{display:flex;justify-content:space-between;align-items:center;position:relative;z-index:2}
.round{width:48px;height:48px;border-radius:999px;border:1px solid rgba(255,255,255,.34);background:rgba(25,70,170,.42);color:white;display:grid;place-items:center;font-size:24px;font-weight:900;backdrop-filter:blur(16px);box-shadow:0 16px 36px rgba(0,30,100,.30)}
.actions{display:flex;gap:10px}
.hero{margin-top:54px;text-align:center;text-shadow:0 4px 18px rgba(0,30,120,.50);position:relative;z-index:2}
.hero h1{margin:0;font-size:clamp(50px,14vw,78px);line-height:1;font-weight:950;letter-spacing:.04em}
.hero p{margin:14px auto 0;max-width:420px;font-size:clamp(16px,4.6vw,22px);font-weight:850;line-height:1.55;color:rgba(255,255,255,.94)}
.menu{width:min(100%,560px);margin:48px auto 0;display:grid;gap:16px;position:relative;z-index:2}
.gate{position:relative;overflow:hidden;min-height:126px;border:1px solid rgba(255,255,255,.44);border-radius:32px;color:white;cursor:pointer;box-shadow:0 22px 52px rgba(0,20,90,.36);backdrop-filter:blur(20px) saturate(130%);transition:.22s ease;text-decoration:none;display:block}
.gate:active{transform:scale(.985)}
.gate:before{content:"";position:absolute;inset:0;opacity:.95}
.gate:after{content:"";position:absolute;inset:-70%;background:linear-gradient(120deg,transparent 31%,rgba(255,255,255,.36) 45%,transparent 58%);transform:translateX(-70%) rotate(8deg);transition:.55s ease}
.gate:hover:after{transform:translateX(42%) rotate(8deg)}
.launcher:before{background:radial-gradient(circle at 82% 18%,rgba(255,255,255,.35),transparent 28%),linear-gradient(135deg,rgba(65,145,255,.88),rgba(72,75,238,.76))}
.pers:before{background:radial-gradient(circle at 82% 18%,rgba(255,255,255,.36),transparent 28%),linear-gradient(135deg,rgba(255,97,184,.88),rgba(155,78,255,.74))}
.gra:before{background:radial-gradient(circle at 82% 18%,rgba(255,255,255,.36),transparent 28%),linear-gradient(135deg,rgba(0,212,196,.86),rgba(48,176,255,.74))}
.game:before{background:radial-gradient(circle at 82% 18%,rgba(255,255,255,.36),transparent 28%),linear-gradient(135deg,rgba(255,174,66,.90),rgba(255,89,132,.72))}
.inner{position:relative;z-index:2;height:100%;padding:22px;display:grid;grid-template-columns:70px 1fr 40px;gap:16px;align-items:center}
.icon{width:70px;height:70px;border-radius:24px;background:rgba(255,255,255,.23);border:1px solid rgba(255,255,255,.36);display:grid;place-items:center;font-size:36px;box-shadow:inset 0 0 24px rgba(255,255,255,.15),0 12px 24px rgba(0,0,0,.16)}
.gate h2{margin:0;font-size:clamp(25px,7vw,35px);line-height:1.12;font-weight:950;letter-spacing:-.03em;text-shadow:0 4px 14px rgba(0,20,90,.35)}
.gate h2 span{font-size:.62em}
.gate p{margin:7px 0 0;font-size:clamp(13px,3.7vw,16px);font-weight:800;line-height:1.45;color:rgba(255,255,255,.88)}
.arrow{width:40px;height:40px;border-radius:999px;background:rgba(255,255,255,.23);display:grid;place-items:center;font-size:30px;font-weight:900}
.guide{width:min(100%,560px);margin:22px auto 0;border:1px solid rgba(255,255,255,.28);border-radius:28px;background:rgba(25,78,190,.36);backdrop-filter:blur(20px);box-shadow:0 18px 44px rgba(0,20,80,.35);padding:17px;display:flex;gap:14px;align-items:center;position:relative;z-index:2}
.bot{width:60px;height:60px;flex:0 0 60px;border-radius:22px;background:rgba(255,255,255,.23);display:grid;place-items:center;font-size:32px}
.guide strong{display:block;margin-bottom:4px;font-size:17px}
.guide span{font-size:14px;font-weight:750;line-height:1.5;color:rgba(255,255,255,.80)}
.petal{position:fixed;top:-10%;width:9px;height:18px;border-radius:999px 999px 999px 0;background:rgba(255,177,232,.78);box-shadow:0 0 12px rgba(255,180,240,.65);animation:fall linear infinite;z-index:1;pointer-events:none}
.p1{left:8%;animation-duration:13s;animation-delay:-3s}.p2{left:26%;animation-duration:16s;animation-delay:-8s;scale:.65}.p3{left:58%;animation-duration:12s;animation-delay:-5s;scale:.8}.p4{left:83%;animation-duration:18s;animation-delay:-11s;scale:.6}
@keyframes fall{0%{top:-10%;translate:0 0;rotate:0deg}50%{translate:36px 55dvh;rotate:170deg}100%{top:110%;translate:-28px 100dvh;rotate:360deg}}
.modal{position:fixed;inset:0;z-index:20;display:none;place-items:center;padding:22px;background:rgba(2,8,40,.46);backdrop-filter:blur(8px)}
.modal.open{display:grid}
.modal-card{width:min(100%,470px);border:1px solid rgba(255,255,255,.34);border-radius:34px;background:rgba(28,83,190,.86);box-shadow:0 30px 90px rgba(0,0,0,.42);padding:24px}
.modal-card h3{margin:0 0 8px;font-size:30px}
.modal-card p{margin:0 0 18px;line-height:1.7;color:rgba(255,255,255,.86);font-weight:750}
.game-link{display:flex;align-items:center;gap:12px;padding:16px;border-radius:22px;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.25);color:white;text-decoration:none;font-weight:950;font-size:20px;margin-top:12px}
.game-link small{display:block;font-size:13px;color:rgba(255,255,255,.76);font-weight:750;margin-top:2px}
.close{width:100%;height:52px;margin-top:14px;border:0;border-radius:18px;background:white;color:#082065;font-size:17px;font-weight:900;cursor:pointer}
@media(min-width:780px){.menu{grid-template-columns:1fr 1fr;max-width:860px;width:min(100%,860px)}.guide{width:min(100%,860px)}}
</style>
</head>
<body>
<div class="app">
<i class="petal p1"></i><i class="petal p2"></i><i class="petal p3"></i><i class="petal p4"></i>

<header>
<button class="round">≡</button>
<div class="actions"><button class="round">👤</button><button class="round">⚙</button></div>
</header>

<section class="hero">
<h1>AIナビ</h1>
<p>社内AIツールへ、楽しく迷わずアクセス。</p>
</section>

<main class="menu">
<a class="gate launcher" href="ai_launcher.html">
<div class="inner"><div class="icon">🧭</div><div><h2>AIランチャ</h2><p>用途に合う生成AIを選ぶ</p></div><div class="arrow">›</div></div>
</a>

<a class="gate pers" href="https://chatgpt.com/g/g-69cb714ae61c8191b3a0a594f611d8a4-ai-zawa-vision" target="_blank">
<div class="inner"><div class="icon">🏙️</div><div><h2>パース生成</h2><p>建築イメージを見える化</p></div><div class="arrow">›</div></div>
</a>

<a class="gate gra" href="https://chatgpt.com/g/g-69d5bb1f42dc8191930bc880c2acd27d-xiang-ze-jian-she-kurarekokurieta" target="_blank">
<div class="inner"><div class="icon">📝</div><div><h2>グラレコ生成</h2><p>内容をわかりやすく図解</p></div><div class="arrow">›</div></div>
</a>

<button class="gate game" onclick="openGame()" style="border:1px solid rgba(255,255,255,.44);font:inherit;text-align:left;padding:0">
<div class="inner"><div class="icon">🎮</div><div><h2>ゲーム<br><span>AI制作紹介</span></h2><p>AIで作った作品を紹介</p></div><div class="arrow">›</div></div>
</button>
</main>

<section class="guide">
<div class="bot">🤖</div>
<div><strong>迷ったらAIランチャへ</strong><span>目的を選ぶだけで、おすすめAIを確認できます。</span></div>
</section>
</div>

<div class="modal" id="gameModal">
<div class="modal-card">
<h3>ゲーム（AI制作紹介）</h3>
<p>AIを使って制作したミニコンテンツです。社内AI技術紹介・来客向けアピール用です。</p>
<a class="game-link" href="blackjack.html"><span>🃏</span><span>ブラックジャック<small>AI制作ゲーム紹介</small></span></a>
<a class="game-link" href="bita_oshi.html"><span>⚡</span><span>ビタオシチャレンジ<small>AI制作ゲーム紹介</small></span></a>
<button class="close" onclick="closeGame()">閉じる</button>
</div>
</div>

<script>
function openGame(){document.getElementById("gameModal").classList.add("open")}
function closeGame(){document.getElementById("gameModal").classList.remove("open")}
document.getElementById("gameModal").addEventListener("click",function(e){if(e.target.id==="gameModal")closeGame()})
</script>
</body>
</html>
